[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-python-sdk"
version = "1.0.0"
description = "Python SDK for Coding.net OpenAPI - Auto-generated from OpenAPI specification"
readme = "README.md"
requires-python = ">=3.14"
license = {text = "MIT"}
authors = [
    {name = "jjundot", email = "jjundot@example.com"}
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.14",
    "Operating System :: OS Independent",
]

dependencies = [
    "httpx>=0.24.0",
    "pydantic>=2.0.0",
    "python-dateutil>=2.8.2",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "black>=23.0",
    "ruff>=0.1.0",
    "mypy>=1.0",
]

[project.urls]
Homepage = "https://github.com/jjundot/coding-python-sdk"
Repository = "https://github.com/jjundot/coding-python-sdk.git"

[tool.hatch.build.targets.wheel]
packages = ["src/coding_sdk"]

[tool.black]
line-length = 120
target-version = ['py314']

[tool.ruff]
line-length = 120
target-version = "py314"

[tool.mypy]
python_version = "3.14"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
